<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Akamai-style reload simulator</title>
</head>
<body>
<div id="phase"></div>
<div id="content"></div>
<p><a id="reset" href="?reset=1">reset</a></p>

<script>
  // Mimics Akamai Bot Manager's challenge-then-reload pattern on a static host.
  //
  //   first visit  -> small "checking" shell. We override document.body.innerText
  //                   so its getter returns a Promise. Playwright/CDP awaits page
  //                   return values, so the validator's element_text eval stays
  //                   pending in the page's V8 context. While it's pending we fire
  //                   location.reload(), V8 tears down the context, and the
  //                   pending Promise can never resolve -> CDP rejects the eval
  //                   with "Execution context was destroyed, most likely because
  //                   of a navigation."
  //   second visit -> full content (~5k chars). No override, no reload.
  //
  // sessionStorage survives a same-tab reload but clears in a new tab/window
  // or via the reset link.

  var SOLVED_KEY = 'challenge_solved';
  var params = new URLSearchParams(location.search);
  if (params.get('reset') === '1') {
    sessionStorage.removeItem(SOLVED_KEY);
    location.replace(location.pathname);
  }

  var phase = document.getElementById('phase');
  var content = document.getElementById('content');

  if (sessionStorage.getItem(SOLVED_KEY)) {
    phase.textContent = 'phase: post-challenge (reload completed)';
    var filler = 'inventory listing content row '.repeat(200);
    content.innerHTML = '<h1>Inventory</h1><p>' + filler + '</p>';
  } else {
    phase.textContent = 'phase: pre-challenge (shell)';
    content.textContent = 'checking your browser...';
    sessionStorage.setItem(SOLVED_KEY, '1');

    // Install the slow-async innerText override AFTER the outer wait_doc's own
    // body_text_length read has finished. body_text_length is computed in
    // expression-libs/src/v2/common/types.ts:160-178 right after wait_doc
    // resolves; we want that to read the real innerText quickly so it doesn't
    // collide with the validator's run. By 200ms the outer wait_doc post-step
    // is well done and the validator hook is starting its 10-iter poll loop.
    setTimeout(function () {
      Object.defineProperty(document.body, 'innerText', {
        configurable: true,
        get: function () {
          return new Promise(function (resolve) {
            setTimeout(function () { resolve('checking...'); }, 2000);
          });
        }
      });
    }, 200);

    // Fire the reload while the validator's element_text Promise is pending.
    // Slow getter installed at 200ms, validator's first eval lands shortly after,
    // 800ms reload fires firmly inside the 2s pending window.
    setTimeout(function () { location.reload(); }, 800);
  }
</script>
</body>
</html>
